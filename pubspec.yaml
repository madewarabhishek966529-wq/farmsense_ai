name: farmsense_ai
description: FarmSense AI - Crop Disease Detection using Gemini Vision
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Google Generative AI (Gemini)
  google_generative_ai: ^0.4.3

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # UI
  cupertino_icons: ^1.0.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0
  
  # Utils
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  translator: 1.0.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
